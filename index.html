<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery POS System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
 <body>
  <header class="top-bar">
    <div class="store-name">Store Name</div>
    <div class="date-time" id="current-date-time">date/time</div>
    <div class="cashier-info">Cashier info</div> 
  </header>

  <main class="pos-layout">
    <section class="product-panel">

      <div class="category-tabs"> 
        <button class="tab-btn active">All</button>
        <button class="tab-btn">Fruits/Vegetables</button>
        <button class="tab-btn">Rice</button>
        <button class="tab-btn">Pasalubong</button>
        <button class="tab-btn">Cooking Essentials</button>
      </div>

      <div class="product-grid">
        </div>

    </section>
    
    <aside class="cart-panel">

      <div class="cart-header">
        <a href="manager.html" class="dashboard-link manager-only">📊</a>
        <span>Sale</span>
        <button id="clear-sale-btn" class="clear-btn manager-only">Clear Sale</button>
        <button id="logout-user-btn" class="logout-btn">Logout</button>
      </div>

      <!-- Hold Transaction Section -->
      <div class="hold-section">
        <div class="hold-section-row">
          <input type="text" id="hold-label" class="hold-label-input" placeholder="Hold label (optional)">
          <button id="hold-sale-btn" class="hold-sale-btn">Hold Sale</button>
        </div>
        <div class="hold-footer-row">
          <span class="hold-footer-label">Held Sales</span>
          <button id="view-holds-btn" class="view-holds-btn">View Held Sales</button>
        </div>
        <div id="held-sales-list" class="held-sales-list"></div>
      </div>

      <!-- Refund Section — manager only -->
      <div class="refund-section manager-only">
        <div class="refund-title">🔄 Process Refund</div>
        <div class="refund-input-row">
          <input type="number" id="refund-transaction-id" class="refund-id-input" 
            placeholder="Transaction ID" min="1">
          <button id="lookup-transaction-btn" class="lookup-btn">Look Up</button>
          <button id="cancel-refund-btn" class="cancel-refund-btn">✕</button>
        </div>
        <div id="refund-details" class="refund-details">
          <div id="refund-transaction-info"></div>
          <button id="confirm-refund-btn" class="confirm-refund-btn">Confirm Refund</button>
        </div>
      </div>

      <div class="cart-items">...</div>

      <!-- Discount Section — manager only -->
      <div class="discount-section manager-only">
        <div class="discount-title">Manager Discount</div>
        <input type="text" id="discount-label" class="discount-label-input" 
          placeholder="e.g. Senior Citizen">
        <select id="discount-type" class="discount-type-select">
          <option value="fixed">Fixed Amount (₱)</option>
          <option value="percentage">Percentage (%)</option>
        </select>
        <input type="number" id="discount-value" class="discount-value-input" 
          placeholder="Amount" min="0" step="0.01">
        <button id="apply-discount-btn" class="apply-discount-btn">Apply</button>
        <button id="clear-discount-btn" class="clear-discount-btn">Clear</button>
      </div>

      <div class="cart-totals">
        <div class="total-row">
          <span>Subtotal</span>
          <span>₱0.00</span>
        </div>
        <div class="total-row discount-display-row" style="color: red; display: none;">
          <span>Discount</span>
          <span id="discount-display-amount">-₱0.00</span>
        </div>
        <div class="total-row">
          <span>Tax (12%)</span>
          <span>₱0.00</span>
        </div>
        <div class="total-row grand-total">
          <span>Total</span>
          <span>₱0.00</span>
        </div>
        <div class="payment-method-selector">
          <div class="payment-label">Payment Method</div>
          <div class="payment-buttons">
            <button class="payment-btn active" data-method="cash">Cash</button>
            <button class="payment-btn" data-method="card">Card</button>
            <button class="payment-btn" data-method="ewallet">E-Wallet</button>
          </div>
        </div>
        <button id="checkout-btn" class="pay-btn">PROCESS PAYMENT</button>
      </div>

    </aside>

  </main>

  <script src="app.js"></script>
</body>
</html>
