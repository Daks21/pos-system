<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
 <body>
  <header class="top-bar">
    <div class="store-name">Store Name</div>
    <div class="date-time" id="current-date-time">date/time</div>
    <div class="cashier-info">Cashier info</div> 
  </header>

  <main class="pos-layout">
    <section class="product-panel">

      <div class="category-tabs"> 
        <button class="tab-btn active">All</button>
        <button class="tab-btn">Fruits/Vegetables</button>
        <button class="tab-btn">Rice</button>
        <button class="tab-btn">Pasalubong</button>
        <button class="tab-btn">Cooking Essentials</button>
      </div>

      <div class="product-grid">
        </div>

    </section>
    
    <aside class="cart-panel">

      <div class="cart-header">
        <span>Current Sale</span>
        <button id="clear-sale-btn" class="clear-btn manager-only">Clear Sale</button>
        <button id="logout-user-btn" class="logout-btn">Logout</button>
      </div>

      <!-- Refund Section — manager only -->
      <div class="refund-section manager-only" style="padding: 10px; border-bottom: 1px solid #ddd; background: #fff8f8;">
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 8px;">🔄 Process Refund</div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="number" id="refund-transaction-id" placeholder="Transaction ID" 
            min="1" style="width: 130px; padding: 5px;">
          <button id="lookup-transaction-btn" style="padding: 5px 10px; cursor: pointer;">Look Up</button>
        </div>

        <!-- transaction details shown after lookup -->
        <div id="refund-details" style="display: none; margin-top: 10px; padding: 8px; background: #f9f9f9; border-radius: 4px; font-size: 13px;">
          <div id="refund-transaction-info"></div>
          <button id="confirm-refund-btn" style="margin-top: 8px; padding: 6px 12px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">
            Confirm Refund
          </button>
        </div>
      </div>




      <div class="cart-items">...</div>
        
      <div class="discount-section manager-only" style="padding: 10px; border-top: 1px solid #ddd; background: #f9f9f9;">
        <div style="margin-bottom: 5px; font-weight: bold; font-size: 14px;">Manager Discount</div>
        <input type="text" id="discount-label" placeholder="e.g. Senior Citizen" style="padding: 5px; width: 140px;">
        <select id="discount-type" style="padding: 5px;">
            <option value="fixed">Fixed Amount (₱)</option>
            <option value="percentage">Percentage (%)</option>
        </select>
        <input type="number" id="discount-value" placeholder="Amount" min="0" step="0.01" style="width: 80px; padding: 5px;">
        <button id="apply-discount-btn" style="padding: 5px 10px; cursor: pointer;">Apply</button>
        <button id="clear-discount-btn" style="padding: 5px 10px; cursor: pointer;">Clear</button>
      </div>

      <div class="cart-totals">

        <div class="total-row">
          <span>Subtotal</span> 
          <span>₱0.00</span>
        </div>

        <div class="total-row discount-display-row" style="color: red; display: none;">
          <span>Discount</span>
          <span id="discount-display-amount">-₱0.00</span>
        </div>

        <div class="total-row">
          <span>Tax (12%)</span>
          <span>₱0.00</span>
        </div>

        <div class="total-row grand-total">
          <span>Total</span>
          <span>₱0.00</span>
        </div>

        <div class="payment-method-selector">
          <div class="payment-label">Payment Method</div>
          <div class="payment-buttons">
            <button class="payment-btn active" data-method="cash">Cash</button>
            <button class="payment-btn" data-method="card">Card</button>
            <button class="payment-btn" data-method="ewallet">E-Wallet</button>
          </div>
        </div>

        <button id="checkout-btn" class="pay-btn">PROCESS PAYMENT</button>
      </div>

    </aside>

  </main>

  <script src="app.js"></script>
</body>
</html>
