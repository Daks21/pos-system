<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div class="store-name">Store Name</div>
    <div class="date-time" id="current-date-time">date/time</div>
    <div class="cashier-info">Cashier info</div> 
  </header>

  <main class="pos-layout">
    <section class="product-panel">

      <div class="category-tabs"> 
        <button class="tab-btn active">All</button>
        <button class="tab-btn">Fruits/Vegetables</button>
        <button class="tab-btn">Rice</button>
        <button class="tab-btn">Pasalubong</button>
        <button class="tab-btn">Cooking Essentials</button>
      </div>

      <div class="product-grid"> 
       <!-- 
        <button class="product-btn">Seedless Grapes<br><span>₱170.00</span></button>
        <button class="product-btn">Ube Hopia Tipas<br><span>₱75.00</span></button>
        <button class="product-btn">Sinandomeng Rice<br><span>₱1200.00</span></button>
        <button class="product-btn">Jasmine-Red Rice<br><span>₱1150.00</span></button>
        <button class="product-btn">Jasmine-Blue Rice<br><span>₱1300.00</span></button>
        <button class="product-btn">Apple<br><span>₱140.00</span></button>
        <button class="product-btn">Kiwi<br><span>₱130.00</span></button>
        <button class="product-btn">Cooking Oil<br><span>₱95.00</span></button>
      -->
      </div>

    </section>
    
    <aside class="cart-panel">

      <div class="cart-header">
        <span>Current Sale</span>
        <button id="clear-sale-btn" class="clear-btn">Clear Sale</button>
      </div>

      <div class="cart-items">...</div>

      <div class="cart-totals">

        <div class="total-row">
          <span>Subtotal</span> 
          <span>₱0.00</span>
        </div>

        <div class="total-row">
          <span>Tax (12%)</span>
          <span>₱0.00</span>
        </div>

        <div class="total-row grand-total">
          <span>Total</span>
          <span>₱0.00</span>
        </div>

        <button id="checkout-btn" class="pay-btn">PROCESS PAYMENT</button>
      </div>

    </aside>

  </main>

  <script src="app.js"></script>
</body>
</html>
